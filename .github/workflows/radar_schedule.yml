name: Chzzk Radar Auto Scan

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: 1. 내 코드(저장소) 불러오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필요한 라이브러리 설치
      run: pip install requests

    - name: 4. 치지직 레이더 봇 실행!
      env:
        CHZZK_CLIENT_ID: ${{ secrets.CHZZK_CLIENT_ID }}
        CHZZK_CLIENT_SECRET: ${{ secrets.CHZZK_CLIENT_SECRET }}
      # ⚠️ 만약 깃허브에 올린 파일명이 ai_studio_code.py라면 아래 줄을 그대로 쓰세요!
      run: python ai_studio_code.py 

    - name: 5. 변경된 DB 파일 자동 저장 (Commit & Push)
      run: |
        git config --local user.email "github-actions@users.noreply.github.com"
        git config --local user.name "github-actions"
        git add chzzk_radar.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 치지직 DB 자동 업데이트" && git push)
